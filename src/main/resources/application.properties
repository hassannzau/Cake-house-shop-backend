spring.application.name=CakeShop
server.port=8000

# MySQL database
spring.datasource.url=jdbc:mysql://localhost:3306/cakeshopdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=hassan
spring.datasource.password=admin

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mail — defaults point to MailHog (localhost:1025) for local development.
# Replace with your real SMTP credentials for production.
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=hassan
spring.mail.password=admin
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
logging.level.org.springframework.security=TRACE
server.error.include-message=always
server.error.include-binding-errors=always

# Base URL used to build the email-verification link
app.base-url=http://localhost:8080

# JWT
jwt.secret=3f8a9b2c1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a
jwt.expiration-ms=86400000

# Stripe — replace with your real secret key from https://dashboard.stripe.com/apikeys
# Use sk_test_... for test mode, sk_live_... for production
stripe.secret-key=sk_test_YOUR_KEY_HERE
